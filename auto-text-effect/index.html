<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Auto-Text</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="auto-text-container">
            <div class="auto-text"></div>
        </div>
        <div class="speed-handler-background">
            <div class="speed-input">
                <input
                    type="number"
                    name="speed-handler"
                />
                <button class="submit-btn" type="button">
                    <div>
                        ✓
                    </div>
                </button>
            </div>
            <div class="speed-regulator">
                <button class="speed-btn speed-up" type="button">+</button>
                <button class="speed-btn speed-down" type="button">-</button>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
