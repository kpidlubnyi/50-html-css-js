<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Content Placeholder</title>
</head>
<body>
    <div id="card" class="card">
        <div id="card-header" class="card-header animated-bg">&nbsp;</div>
        <div id="card-content" class="card-content">
            <h3 class="card-title animated-bg animated-bg-text"></h3>
            <p class="card-excerpt">
                <span class="animated-bg animated-bg-text">&nbsp;</span>
                <span class="animated-bg animated-bg-text">&nbsp;</span>
                <span class="animated-bg animated-bg-text">&nbsp;</span>
            </p>
            <div class="card-profile">
                <div class="profile-photo animated-bg"></div>
                <div class="profile-info">
                    <strong class="username animated-bg animated-bg-text">&nbsp;</strong>
                    <small class="post-date animated-bg animated-bg-text">&nbsp;</small>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
